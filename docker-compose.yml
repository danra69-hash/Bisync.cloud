services:
  postgres:
    image: postgres:16
    container_name: bisync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bisync
      POSTGRES_PASSWORD: bisync
      POSTGRES_DB: bisync
    ports:
      - "5432:5432"
    volumes:
      - bisync_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bisync -d bisync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bisync_pg_data:
